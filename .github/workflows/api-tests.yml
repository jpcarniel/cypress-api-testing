name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: cypress-io/github-action@v6
        with:
          browser: chrome
          install: false
        env:
          CYPRESS_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Generate report
        if: always()
        run: npm run report

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: cypress/reports/
